<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css"/>
    <script src="https://kit.fontawesome.com/4f07e26e28.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Rammetto+One&display=swap" rel="stylesheet">    
    <title>Contact</title>
</head>
<body>
    <nav class="navbar">
        <a href="./index.html" class="navbar__link"><i class="fa-solid fa-mug-hot navbar__icon navbar__icon--flipped"></i></a>
        <input type="checkbox" id="navbar-toggle" class="navbar__list-toggle" />
        <label for="navbar-toggle" class="navbar__hamburger">&#9776;</label>
        <ul class="navbar__list">
            <li class="navbar__item">
                <a href="./about.html" class="navbar__link">ABOUT</a>
            </li>
            <li class="navbar__item">
                <a href="./contact.html" class="navbar__link">CONTACT</a>
            </li>
        </ul>
    </nav>
    <main>
        <section class="contact">
            <div class="contact__heading-container">
                <h2 class="contact__heading">Contact Us</h2>
                <i class="fa-solid fa-comment-dots contact__heading-icon"></i>
            </div>
            
                <form class="contact__form">
                    <div class="contact__form-question">
                        <label for="first-name" class="contact__form-question-label">First Name: </label>
                        <input type="text" id="first-name" name="first-name" class="contact__form-question-input" required />
                    </div>
                    <div class="contact__form-question">
                        <label for="first-name" class="contact__form-question-label">Email: </label>
                        <input type="email" id="email" name="email" class="contact__form-question-input" required />
                    </div>
                    <div class="contact__form-question">
                        <label for="topic" class="contact__form-question-label">Topic: </label>
                        <select id="topic" name="topic" class="contact__form-question-input" required>
                            <option disabled selected value="">Please select a topic...</option>
                            <option value="bookings">Bookings</option>
                            <option value="online-orders">Online orders</option>
                            <option value="complaints">Complaints</option>
                        </select>
                    </div>
                    <div class="contact__form-question">
                        <label for="comment" class="contact__form-question-label">Comment: </label>
                        <textarea id="comment" name="comment" class="contact__form-question-input contact__form-question-input--textarea" required placeholder="Enter your comment here..."></textarea>
                    </div>
                    <button type="submit" class="contact__btn">Submit</button>
                </form>
            
        </section>
    </main>
    <footer class="footer">
        <div class="footer__copyright-info">
            <i class="fa-solid fa-mug-hot footer__copyright-icon footer__copyright-icon--flipped"></i>
            <p class="footer__copyright-text">Copyright 2024</p>
        </div>
        <i class="fa-brands fa-square-instagram footer__social-icon"></i>
    </footer>
</body>
</html>
